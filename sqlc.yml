version: "1"
packages:
  - name: "db"
    path: "sqlc"
    queries: "./db/queries"
    schema: "./db/migrations"
    engine: "postgresql"
    emit_json_tags: true
    emit_prepared_queries: false
    emit_interface: false
    emit_exact_table_names: false
    overrides:
      - db_type: "pg_catalog.numeric"
        go_type:
          import: "github.com/shopspring/decimal"
          type: "Decimal"
      
